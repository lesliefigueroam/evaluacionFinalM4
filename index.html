<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Administrador de Usuarios - API REST</title>
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body>
    <main class="card">
      <h1>👥 Administrador de Usuarios</h1>
      <p class="subtitle">
        Consumo de API con <strong>clase</strong> y <code>XMLHttpRequest</code>.
        Revisa la <strong>consola (F12)</strong> para ver las salidas.
      </p>

      <div class="botones">
        <button id="btnNombres" class="btn">Listar nombres</button>
        <button id="btnBasica" class="btn">Info básica</button>
        <button id="btnDireccion" class="btn">Dirección</button>
        <button id="btnAvanzada" class="btn">Info avanzada</button>
        <button id="btnCompanias" class="btn">Compañías + frase</button>
        <button id="btnOrdenados" class="btn">Nombres ordenados</button>
      </div>

      <div id="estado" class="estado"></div>
      <div id="resultado" class="resultado">
        Presiona un botón. Los resultados también aparecen en la consola.
      </div>
    </main>

    <script src="assets/js/app.js"></script>
  </body>
</html>
